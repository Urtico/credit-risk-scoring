<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Risk Prediction System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 50px;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 32px;
            color: #333;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .form-section {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .result {
            margin-top: 30px;
            padding: 25px;
            border-radius: 10px;
            display: none;
        }

        .result.show {
            display: block;
        }

        .result.success {
            background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
            border: 2px solid #28a745;
            color: #155724;
        }

        .result.danger {
            background: linear-gradient(135deg, #f8d7da 0%, #f5c6cb 100%);
            border: 2px solid #dc3545;
            color: #721c24;
        }

        .result h2 {
            font-size: 22px;
            margin-bottom: 20px;
        }

        .result-item {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-label {
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .result-value {
            font-size: 24px;
            font-weight: bold;
            margin-top: 5px;
        }

        .recommendation {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            margin-top: 20px;
        }

        .error {
            background: #ffe5e5;
            border: 2px solid #ff6b6b;
            color: #c92a2a;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }

        .loading {
            text-align: center;
            color: #667eea;
            display: none;
            margin-top: 20px;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏦 Credit Risk Predictor</h1>
            <p>AI-Powered Loan Default Risk Assessment</p>
        </div>

        <form id="predictionForm">
            <div class="form-section">
                <div class="form-group">
                    <label for="age">👤 Age (years)</label>
                    <input type="number" id="age" placeholder="e.g., 45" min="18" max="100" step="1" required>
                </div>

                <div class="form-group">
                    <label for="income">💰 Annual Income ($)</label>
                    <input type="number" id="income" placeholder="e.g., 62500" min="0" step="1000" required>
                </div>

                <div class="form-group">
                    <label for="loan">💳 Loan Amount ($)</label>
                    <input type="number" id="loan" placeholder="e.g., 15000" min="0" step="1000" required>
                </div>

                <div class="form-group">
                    <label for="credit_years">📅 Credit History (years)</label>
                    <input type="number" id="credit_years" placeholder="e.g., 12" min="0" max="70" step="1" required>
                </div>

                <div class="form-group">
                    <label for="employment_years">💼 Employment Years</label>
                    <input type="number" id="employment_years" placeholder="e.g., 8" min="0" max="70" step="1" required>
                </div>

                <button type="submit">🔮 Predict Risk</button>
            </div>
        </form>

        <div class="loading" id="loading">
            <span class="spinner"></span>
            Analyzing risk profile...
        </div>

        <div class="error" id="error"></div>

        <div class="result" id="result">
            <h2>📊 Prediction Result</h2>

            <div class="result-item">
                <div class="result-label">Default Probability</div>
                <div class="result-value"><span id="prob">0</span>%</div>
            </div>

            <div class="result-item">
                <div class="result-label">Risk Level</div>
                <div class="result-value" id="risk">-</div>
            </div>

            <div class="recommendation" id="rec">-</div>
        </div>
    </div>

    <script>
        const form = document.getElementById('predictionForm');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const resultDiv = document.getElementById('result');

        form.addEventListener('submit', async (e) => {

            resultDiv.style.display = 'none';
